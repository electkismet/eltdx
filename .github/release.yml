changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 新功能
      labels:
        - feature
        - enhancement
    - title: 修复
      labels:
        - fix
        - bug
        - bugfix
    - title: 文档
      labels:
        - docs
        - documentation
    - title: 测试与工程
      labels:
        - test
        - tests
        - ci
        - chore
        - maintenance
    - title: 其他变更
      labels:
        - "*"
