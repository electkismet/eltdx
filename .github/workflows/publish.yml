name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from changelog
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          target_header = f"## {version} - "
          collected: list[str] = []
          capture = False

          for line in changelog:
            if line.startswith(target_header):
              capture = True
            elif capture and line.startswith("## "):
              break

            if capture:
              collected.append(line)

          if not collected:
            raise SystemExit(f"Unable to find changelog section for {version}")

          Path("RELEASE_NOTES.md").write_text("\n".join(collected).strip() + "\n", encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
